<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COORG TOURS AND TRAVELS</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .logo {
            max-width: 200px;
            width: 80%;
            height: auto;
            margin: 20px auto;
        }
        h1 {
            color: #FDB813;
            margin: 10px 0 5px;
            font-size: 28px;
        }
        .location {
            color: #00D4AA;
            margin-bottom: 25px;
            font-size: 18px;
        }
        h2 {
            color: #FDB813;
            margin-top: 30px;
        }
        ul {
            list-style: none;
            padding: 0;
            display: inline-block;
            text-align: left;
        }
        li {
            margin: 12px 0;
            font-size: 16px;
        }
        li::before {
            content: "✓ ";
            color: #00D4AA;
            font-weight: bold;
            margin-right: 8px;
        }
        .book-btn {
            display: inline-block;
            background: #FDB813;
            color: #000;
            padding: 14px 32px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
            font-size: 18px;
        }
        footer {
            margin-top: 40px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Your Coorg Tours and Travels Logo -->
    <img src="coorg-logo.jpg" alt="Coorg Tours and Travels Taxi Service Logo" class="logo">
    
    <h1>TAXI SERVICE</h1>
    <p class="location">Kolakeri, Madikeri, Coorg</p>
    
    <h2><u>Services</u></h2>
    <ul>
        <li>24*7 Available</li>
        <li>Well experienced driver</li>
        <li>Always neat & clean vehicle</li>
    </ul>
    <br>
    <a href="https://maps.app.goo.gl/34u94fudwZaxP7Zh6" class="book-btn">Book Now</a>
    
    <footer>Coorg Tours and Travels</footer>
</body>
</html>
